<!DOCTYPE html>
<html>
<head>
<title>Edit Recipe</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-xl mx-auto mt-10 bg-white p-6 rounded shadow">

<h1 class="text-xl font-bold mb-4">Edit Recipe</h1>

<form method="POST">

<input name="title" value="{{recipe.title}}" class="w-full p-2 border mb-2">

<input name="image" value="{{recipe.image}}" class="w-full p-2 border mb-2">

<textarea name="description" class="w-full p-2 border mb-2">
{{recipe.description}}
</textarea>

<textarea name="ingredients" class="w-full p-2 border mb-2">
{{recipe.ingredients}}
</textarea>

<textarea name="instructions" class="w-full p-2 border mb-2">
{{recipe.instructions}}
</textarea>

<textarea name="tips" class="w-full p-2 border mb-2">
{{recipe.tips}}
</textarea>

<button class="bg-orange-600 text-white px-4 py-2 rounded">
Update
</button>

</form>

</div>

</body>
</html>
