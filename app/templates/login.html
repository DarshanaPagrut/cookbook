<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login • Recipe Cookbook</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-orange-50 via-white to-orange-100 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-xl rounded-xl p-8 w-full max-w-md">

<div class="text-center mb-6">
<h1 class="text-3xl font-bold text-orange-600">🍳 Recipe Cookbook</h1>
<p class="text-gray-500 mt-2">Welcome back! Login to your account.</p>
</div>

<form method="POST" class="space-y-4">

<div>
<label class="block text-sm font-semibold text-gray-600 mb-1">Email</label>
<input 
name="email"
type="email"
placeholder="you@example.com"
required
class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-400">
</div>

<div>
<label class="block text-sm font-semibold text-gray-600 mb-1">Password</label>
<input 
name="password"
type="password"
placeholder="Enter password"
required
class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-400">
</div>

<button
class="w-full bg-orange-600 text-white py-3 rounded-lg font-semibold hover:bg-orange-700 transition">
Login </button>

</form>

<p class="text-sm text-center text-gray-500 mt-6">
Don't have an account?
<a href="/register" class="text-orange-600 font-semibold hover:underline">
Register
</a>
</p>

</div>

</body>
</html>
