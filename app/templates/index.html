<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Cookbook</title>

<script>
if (
localStorage.getItem("theme") === "dark" ||
(!localStorage.getItem("theme") && window.matchMedia("(prefers-color-scheme: dark)").matches)
){
document.documentElement.classList.add("dark");
}
</script>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
darkMode: 'class'
}

function toggleTheme(){
const html = document.documentElement;

if(html.classList.contains("dark")){
html.classList.remove("dark");
localStorage.setItem("theme","light");
}else{
html.classList.add("dark");
localStorage.setItem("theme","dark");
}
}

function toggleRecipeForm(){
document.getElementById("recipeModal").classList.toggle("hidden");
}
</script>

</head>

<body class="bg-gray-50 dark:bg-gray-900 min-h-screen transition-colors">

<!-- NAVBAR -->

<nav class="bg-orange-600 dark:bg-gray-800 p-4 text-white shadow-lg">
<div class="container mx-auto flex justify-between items-center">

<h1 class="text-2xl font-bold">🍳 Recipe Cookbook</h1>

<div class="flex items-center space-x-4">

<!-- THEME TOGGLE -->

<button onclick="toggleTheme()" class="bg-white dark:bg-gray-700 p-2 rounded-full">

<!-- Sun -->

<svg xmlns="http://www.w3.org/2000/svg"
class="w-5 h-5 text-yellow-500 dark:hidden"
fill="none" viewBox="0 0 24 24" stroke="currentColor">

<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
d="M12 3v2m0 14v2m9-9h-2M5 12H3m15.364-6.364l-1.414 1.414M7.05 16.95l-1.414 1.414M18.364 18.364l-1.414-1.414M7.05 7.05L5.636 5.636M12 8a4 4 0 100 8 4 4 0 000-8z"/> </svg>

<!-- Moon -->

<svg xmlns="http://www.w3.org/2000/svg"
class="w-5 h-5 text-white hidden dark:block"
fill="none" viewBox="0 0 24 24" stroke="currentColor">

<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
d="M21 12.79A9 9 0 1111.21 3c0 .34 0 .67.05 1A7 7 0 0021 12.79z"/> </svg>

</button>

<!-- PROFILE DROPDOWN -->

<div class="relative">

<!-- PROFILE BUTTON -->

<button onclick="toggleProfileMenu()" 
class="bg-white dark:bg-gray-700 p-2 rounded-full shadow">

<svg xmlns="http://www.w3.org/2000/svg"
class="w-6 h-6 text-gray-800 dark:text-white"
fill="none" viewBox="0 0 24 24" stroke="currentColor">

<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
d="M5.121 17.804A8 8 0 1118.879 17.804M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>

</svg>

</button>

<!-- DROPDOWN MENU -->

<div id="profileMenu"
class="hidden absolute right-0 mt-2 w-40 bg-white dark:bg-gray-800 rounded-lg shadow-lg border dark:border-gray-700">

<a href="/profile"
class="block px-4 py-2 text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700">
View Profile </a>

<a href="/logout"
class="block px-4 py-2 text-red-500 hover:bg-gray-100 dark:hover:bg-gray-700">
Logout </a>

</div>

</div>

<script>
function toggleProfileMenu() {
const menu = document.getElementById("profileMenu");
menu.classList.toggle("hidden");
}
</script>


</div>
</div>
</nav>

<!-- CREATE RECIPE BUTTON BELOW NAVBAR -->

<div class="container mx-auto mt-6 px-4 flex justify-end">

<button onclick="toggleRecipeForm()" 
class="bg-orange-600 text-white px-4 py-2 rounded-lg shadow hover:bg-orange-700 transition">
➕ Create Recipe </button>

</div>

<!-- CREATE RECIPE MODAL -->

<div id="recipeModal"
class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center hidden">

<div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-lg w-full max-w-lg">

<h2 class="text-xl font-bold mb-4 dark:text-white">Create Recipe</h2>

<form action="/create-recipe" method="POST" class="space-y-3">

<input type="text" name="title" placeholder="Recipe name" required
class="w-full p-2 border rounded">

<input type="text" name="image" placeholder="Image URL"
class="w-full p-2 border rounded">

<textarea name="description" placeholder="Short description"
class="w-full p-2 border rounded"></textarea>

<textarea name="ingredients" placeholder="Ingredients"
class="w-full p-2 border rounded"></textarea>

<textarea name="instructions" placeholder="Steps"
class="w-full p-2 border rounded"></textarea>

<textarea name="tips" placeholder="Tips"
class="w-full p-2 border rounded"></textarea>

<div class="flex justify-between">

<button type="button"
onclick="toggleRecipeForm()"
class="bg-gray-400 text-white px-4 py-2 rounded">
Cancel </button>

<button class="bg-orange-600 text-white px-4 py-2 rounded">
Save Recipe
</button>

</div>

</form>

</div>
</div>

<main class="container mx-auto py-8 px-4">

<h2 class="text-2xl font-bold mb-6 text-gray-800 dark:text-white">
My Recipes
</h2>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

{% for recipe in recipes %}

<div class="bg-white dark:bg-gray-800 rounded-xl shadow hover:shadow-lg overflow-hidden">

<a href="/recipe/{{recipe._id}}">

<img src="{{recipe.image or 'https://via.placeholder.com/400'}}"
class="w-full h-48 object-cover">

<div class="p-4">

<h3 class="text-xl font-bold text-gray-900 dark:text-white">
{{recipe.title}}
</h3>

<p class="text-gray-600 dark:text-gray-300 text-sm mt-2">
{{recipe.description}}
</p>

</div>

</a>

<div class="flex justify-between p-4 border-t dark:border-gray-700">

<a href="/edit/{{recipe._id}}" 
class="text-blue-600 font-semibold">
Edit </a>

<form action="/delete/{{recipe._id}}" method="POST">
<button class="text-red-600 font-semibold">
Delete
</button>
</form>

</div>

</div>

{% endfor %}

</div>

</main>

</body>
</html>
